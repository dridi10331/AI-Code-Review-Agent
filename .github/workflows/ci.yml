name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        pip install -e .
    
    - name: Run ruff format check
      run: ruff format --check .
    
    - name: Run ruff linter
      run: ruff check .
    
    - name: Run type checker
      run: mypy backend/ --ignore-missing-imports
      continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run bandit security scan
      run: bandit -r backend/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependencies for vulnerabilities
      run: safety check --json
      continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ai-code-review-agent:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test docker-compose
      run: |
        docker compose config
        docker compose up -d postgres redis
        sleep 10
        docker compose ps
        docker compose down

  health-check:
    name: API Health Check
    runs-on: ubuntu-latest
    needs: [docker]
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: review_user
          POSTGRES_PASSWORD: review_pass
          POSTGRES_DB: code_reviews
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Create .env file
      run: |
        cat > .env << EOF
        APP_NAME="AI Code Review Agent"
        ENVIRONMENT=test
        LOG_LEVEL=INFO
        DATABASE_URL=postgresql+asyncpg://review_user:review_pass@localhost:5432/code_reviews
        REDIS_URL=redis://localhost:6379/0
        USE_OLLAMA_ONLY=true
        OLLAMA_BASE_URL=http://localhost:11434
        OLLAMA_PRIMARY_MODEL=codellama
        AUTH_MODE=none
        CACHE_TTL_SECONDS=3600
        CACHE_SIMILARITY_THRESHOLD=0.85
        RATE_LIMIT_REQUESTS=100
        RATE_LIMIT_WINDOW_SECONDS=3600
        EOF
    
    - name: Start FastAPI server
      run: |
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10
    
    - name: Health check
      run: |
        curl -f http://localhost:8000/api/v1/health || exit 1
        echo "Health check passed!"
    
    - name: API smoke test
      run: |
        curl -f http://localhost:8000/ || exit 1
        echo "API smoke test passed!"

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, security, docker, health-check]
    if: always()
    
    steps:
    - name: Check results
      run: |
        echo "Lint: ${{ needs.lint.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Docker: ${{ needs.docker.result }}"
        echo "Health Check: ${{ needs.health-check.result }}"
        
        if [ "${{ needs.lint.result }}" != "success" ]; then
          echo "❌ Lint failed"
          exit 1
        fi
        
        if [ "${{ needs.docker.result }}" != "success" ]; then
          echo "❌ Docker build failed"
          exit 1
        fi
        
        if [ "${{ needs.health-check.result }}" != "success" ]; then
          echo "❌ Health check failed"
          exit 1
        fi
        
        echo "✅ All checks passed!"
